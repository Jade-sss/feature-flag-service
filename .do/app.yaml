# DigitalOcean App Platform Specification
# Deploy via: doctl apps create --spec .do/app.yaml
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

spec:
  name: feature-flag-service
  region: nyc

  # ── Web Service (the API) ──────────────────────────────────────────────────
  services:
    - name: api
      github:
        repo: Jade-sss/feature-flag-service
        branch: main
        deploy_on_push: true
      dockerfile_path: Dockerfile
      http_port: 8000
      instance_count: 1
      instance_size_slug: basic-xxs  # $5/mo — 1 vCPU, 512 MB
      health_check:
        http_path: /
        initial_delay_seconds: 10
        period_seconds: 30
      envs:
        - key: ENV
          value: production
        - key: DATABASE_URL
          value: ${db.DATABASE_URL}
          type: SECRET
        - key: REDIS_URL
          value: ${redis.REDIS_URL}
          type: SECRET
        - key: AUTH_ENABLED
          value: "true"
        - key: MASTER_API_KEY
          type: SECRET
          value: CHANGE_ME_GENERATE_A_STRONG_SECRET
        - key: LOG_FORMAT
          value: json
        - key: CORS_ORIGINS
          value: "*"
        - key: ALLOWED_HOSTS
          value: "*"
        - key: DB_POOL_SIZE
          value: "5"
        - key: DB_POOL_MAX_OVERFLOW
          value: "10"
      routes:
        - path: /

  # ── Job: run migrations before each deploy ─────────────────────────────────
  jobs:
    - name: migrate
      github:
        repo: Jade-sss/feature-flag-service
        branch: main
      dockerfile_path: Dockerfile
      kind: PRE_DEPLOY
      instance_count: 1
      instance_size_slug: basic-xxs
      envs:
        - key: DATABASE_URL
          value: ${db.DATABASE_URL}
          type: SECRET
      run_command: python -m alembic upgrade head

  # ── Managed Database ───────────────────────────────────────────────────────
  databases:
    - name: db
      engine: PG
      version: "16"
      size: db-s-dev-database    # $7/mo — 1 vCPU, 1 GB RAM, 10 GB disk
      num_nodes: 1

    - name: redis
      engine: REDIS
      version: "7"
      size: db-s-dev-database    # $10/mo — 1 node
      num_nodes: 1
